<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        template="/layout/main.xhtml">
    <ui:define name="content">
        <h:panelGrid border="1" class="table">
            <f:facet name="header">
                <h:outputText value="#{title}"/>
            </f:facet>
            <h:form id="newProductForm">
                <h:commandLink value="[+] #{multiLanguage['menu.text.new']}" action="product-form.xhtml"
                               class="btn btn-primary my-2"/>
            </h:form>
            <h:outputText value="#{multiLanguage['product.text.noResults']}" rendered="#{empty products}" class="alert alert-warning"/>
            <h:dataTable value="#{products}" var="p" rendered="#{not empty products}"
                         class="table table-hover table-striped">
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.id']}"/>
                    </f:facet>
                    <h:outputText value="#{p.id}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.name']}"/>
                    </f:facet>
                    <h:outputText value="#{p.name}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.sku']}"/>
                    </f:facet>
                    <h:outputText value="#{p.sku}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.price']}"/>
                    </f:facet>
                    <h:outputText value="#{p.price}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.createdAt']}"/>
                    </f:facet>
                    <h:outputText value="#{p.createdAt}">
                        <f:convertDateTime type="localDate" pattern="dd/MM/yyyy"/>
                    </h:outputText>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.category']}"/>
                    </f:facet>
                    <h:outputText value="#{p.category.name}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.button.edit']}"/>
                    </f:facet>
                    <h:form id="editForm">
                        <h:commandLink value="#{multiLanguage['product.button.edit']}"
                                       action="#{productController.edit(p.id)}"
                                       class="btn btn-sm btn-success"/>
                    </h:form>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.button.edit']} 2"/>
                    </f:facet>
                    <h:link value="#{multiLanguage['product.button.edit']}" outcome="product-form"
                            class="btn btn-sm btn-info">
                        <f:param name="id" value="#{p.id}"/>
                    </h:link>
                </h:column>
                <h:column>
                    <f:facet name="header">
                        <h:outputText value="#{multiLanguage['product.button.delete']}"/>
                    </f:facet>
                    <h:form id="deleteForm">
                        <h:commandLink value="#{multiLanguage['product.button.delete']}"
                                       action="#{productController.delete(p)}"
                                       onclick="return confirm('Are you sure you want to delete this record?')"
                                       class="btn btn-sm btn-danger"/>
                    </h:form>
                </h:column>
            </h:dataTable>
        </h:panelGrid>
    </ui:define>
</ui:composition>
