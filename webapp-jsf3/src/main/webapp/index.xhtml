<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8" />
    <title>#{title}</title>
</h:head>
<h:body>
    <h1><h:outputText value="#{title}" /></h1>
    <h:dataTable value="#{products}" var="product">
        <h:column>
            <f:facet name="header">
                <h:outputText value="ID" />
            </f:facet>
            <h:outputText value="#{product.id}" />
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="Name" />
            </f:facet>
            <h:outputText value="#{product.name}" />
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="SKU" />
            </f:facet>
            <h:outputText value="#{product.sku}" />
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="Price" />
            </f:facet>
            <h:outputText value="#{product.price}" />
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="Created At" />
            </f:facet>
            <h:outputText value="#{product.createdAt}" />
        </h:column>
    </h:dataTable>
</h:body>
</html>
