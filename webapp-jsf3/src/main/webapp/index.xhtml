<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <title>#{title}</title>
</h:head>
<h:body>
    <h:panelGrid border="1">
        <f:facet name="header">
            <h:outputText value="#{title}"/>
        </f:facet>
        <h:form id="newProductForm">
            <h:commandLink value="[+] New Product" action="product-form.xhtml"/>
        </h:form>
        <h:outputText value="No products to show" rendered="#{empty products}" />
        <h:dataTable value="#{products}" var="p" rendered="#{not empty products}">
            <h:column>
                <f:facet name="header">
                    <h:outputText value="ID"/>
                </f:facet>
                <h:outputText value="#{p.id}"/>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Name"/>
                </f:facet>
                <h:outputText value="#{p.name}"/>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="SKU"/>
                </f:facet>
                <h:outputText value="#{p.sku}"/>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Price"/>
                </f:facet>
                <h:outputText value="#{p.price}"/>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Created At"/>
                </f:facet>
                <h:outputText value="#{p.createdAt}">
                    <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
                </h:outputText>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Edit" />
                </f:facet>
                <h:form id="editForm">
                    <h:commandLink value="Edit" action="#{productController.edit(p.id)}" />
                </h:form>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Edit 2" />
                </f:facet>
                <h:link value="Edit" outcome="product-form">
                    <f:param name="id" value="#{p.id}" />
                </h:link>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Delete" />
                </f:facet>
                <h:form id="deleteForm">
                    <h:commandLink value="Delete" action="#{productController.delete(p.id)}"
                                   onclick="return confirm('Are you sure you want to delete this record?')" />
                </h:form>
            </h:column>
        </h:dataTable>
    </h:panelGrid>
</h:body>
</html>
