<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <meta charset="UTF-8"/>
    <h:outputStylesheet name="css/bootstrap.min.css"/>
    <ui:insert name="head" />
    <title>#{title}</title>
</h:head>
<h:body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <h:link outcome="index" value="Home" class="nav-link active"/>
                    </li>
                    <li class="nav-item">
                        <h:link outcome="product-form" value="New Product" class="nav-link"/>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h:messages globalOnly="true" styleClass="alert list-group pe-0"
                    errorClass="alert list-group-item list-group-item-danger"
                    infoClass="alert list-group-item list-group-item-success"
                    warnClass="alert list-group-item list-group-item-warning" />
        <ui:insert name="content" />
        <hr/>
        <footer style="clear: both">
            <h:graphicImage value="/public/img/jakarta_ee_400x400.png" alt="Jakarta EE logo"/>
            <p>Developed by Santiago Restrepo Prado, 2025</p>
            <h:outputScript name="js/bootstrap.bundle.min.js"/>
            <ui:insert name="js" />
        </footer>
    </div>
</h:body>
</html>
