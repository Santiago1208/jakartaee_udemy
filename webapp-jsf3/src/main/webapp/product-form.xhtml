<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        template="/layout/main.xhtml">
    <ui:define name="content">
        <f:metadata>
            <f:viewParam name="id" value="#{productController.id}"/>
        </f:metadata>
        <h:panelGrid border="1" class="table">
            <f:facet name="header">
                <h:outputText value="#{product.id > 0 ? 'Edit' : 'New'} Product"/>
            </f:facet>
            <h:link outcome="index" value="Back" class="btn btn-sm btn-primary my-2"/>
            <h:form>
                <h:panelGrid columns="3" class="table table-hover table-striped">
                    <h:outputLabel value="Name:" for="name" class="col-form-label"/>
                    <h:inputText id="name" value="#{product.name}" label="Name" class="form-control"/>
                    <h:message for="name" style="color: red;"/>

                    <h:outputLabel value="Price:" for="price" class="col-form-label"/>
                    <h:inputText id="price" value="#{product.price}" label="Price" class="form-control"/>
                    <h:message for="price" style="color: red;"/>

                    <h:outputLabel value="SKU:" for="sku" class="col-form-label"/>
                    <h:inputText id="sku" value="#{product.sku}" label="SKU" class="form-control"/>
                    <h:message for="sku" style="color: red;"/>

                    <h:outputLabel value="Created At:" for="createdAt" class="col-form-label"/>
                    <h:inputText id="createdAt" value="#{product.createdAt}"
                                 convertMessage="Check your date format to be yyyy-MM-dd" label="Created At"
                                 class="form-control">
                        <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                        <f:passThroughAttribute name="type" value="date"/>
                    </h:inputText>
                    <h:message for="createdAt" style="color: red;"/>

                    <h:outputLabel value="Category:" for="category" class="col-form-label"/>
                    <h:selectOneMenu id="category" value="#{product.category}" class="form-select">
                        <f:selectItem itemLabel="--- Select One ---" itemValue="#{null}"/>
                        <f:selectItems value="#{categories}" var="c" itemLabel="#{c.name}"/>
                        <f:converter binding="#{categoryConverter}"/>
                    </h:selectOneMenu>
                    <h:message for="category" style="color: red;"/>

                    <h:commandButton value="#{product.id > 0 ? 'Edit' : 'Save'}" action="#{productController.save}"
                                     class="btn btn-primary"/>
                    <h:inputHidden value="#{product.id}"/>
                    <p>&#160;</p>
                </h:panelGrid>
            </h:form>
        </h:panelGrid>
    </ui:define>
</ui:composition>
