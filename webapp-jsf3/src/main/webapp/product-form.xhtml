<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <title>Product Form</title>
</h:head>
<h:body>
    <f:metadata>
        <f:viewParam name="id" value="#{productController.id}" />
    </f:metadata>
    <h:panelGrid border="1">
        <f:facet name="header">
            <h:outputText value="Product Form"/>
        </f:facet>
        <h:link outcome="index" value="Back" />
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel value="Name:" for="name"/>
                <h:inputText id="name" value="#{product.name}"/>

                <h:outputLabel value="Price:" for="price"/>
                <h:inputText id="price" value="#{product.price}"/>

                <h:outputLabel value="SKU:" for="sku"/>
                <h:inputText id="sku" value="#{product.sku}"/>

                <h:commandButton value="Save" action="#{productController.save}"/>
                <h:inputHidden value="#{product.id}"/>
            </h:panelGrid>
        </h:form>
    </h:panelGrid>
</h:body>
</html>
