<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <title>Product Form</title>
</h:head>
<h:body>
    <f:metadata>
        <f:viewParam name="id" value="#{productController.id}" />
    </f:metadata>
    <h:messages style="color: red" />
    <h:panelGrid border="1">
        <f:facet name="header">
            <h:outputText value="#{product.id > 0 ? 'Edit' : 'New'} Product"/>
        </f:facet>
        <h:link outcome="index" value="Back" />
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel value="Name:" for="name"/>
                <h:inputText id="name" value="#{product.name}" required="true" label="Name"/>

                <h:outputLabel value="Price:" for="price"/>
                <h:inputText id="price" value="#{product.price}" required="true" label="Price"/>

                <h:outputLabel value="SKU:" for="sku"/>
                <h:inputText id="sku" value="#{product.sku}" required="true" label="SKU"/>

                <h:outputLabel value="Created At:" for="createdAt"/>
                <h:inputText id="createdAt" value="#{product.createdAt}"
                             convertMessage="Check your date format to be yyyy-MM-dd" label="Created At" required="true">
                    <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />
                    <f:passThroughAttribute name="type" value="date" />
                </h:inputText>

                <h:outputLabel value="Category:" for="category"/>
                <h:selectOneMenu id="category" value="#{product.category}">
                    <f:selectItem itemLabel="--- Select One ---" itemValue="#{null}" />
                    <f:selectItems value="#{categories}" var="c" itemLabel="#{c.name}" itemValue="#{c.id}"/>
                </h:selectOneMenu>

                <h:commandButton value="#{product.id > 0 ? 'Edit' : 'Save'}" action="#{productController.save}"/>
                <h:inputHidden value="#{product.id}"/>
            </h:panelGrid>
        </h:form>
    </h:panelGrid>
</h:body>
</html>
