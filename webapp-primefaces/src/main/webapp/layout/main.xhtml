<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="#{multiLanguageController.locale}">
<f:view
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="primefaces"
        locale="#{multiLanguageController.locale}">
    <h:head>
        <meta charset="UTF-8"/>
        <ui:insert name="head"/>
        <title>#{title}</title>
    </h:head>
    <h:body>
        <h:form>
            <p:menubar>
                <p:menuitem value="#{multiLanguage['menu.text.home']}" outcome="index" icon="pi pi-fw pi-home"/>
                <p:menuitem value="#{multiLanguage['menu.text.new']}" outcome="product-form" icon="pi pi-fw pi-plus"/>
                <p:menuitem icon="pi pi-fw pi-flag">
                    <p:selectOneMenu value="#{multiLanguageController.language}"
                                     valueChangeListener="#{multiLanguageController.changeLanguage}"
                                     onchange="submit()">
                        <f:selectItem itemLabel="#{multiLanguage['menu.text.language']}" itemValue="es"/>
                        <f:selectItems value="#{multiLanguageController.supportedLang}"/>
                    </p:selectOneMenu>

                </p:menuitem>
            </p:menubar>
        </h:form>
        <p:card>
            <p:messages globalOnly="true" closable="true"/>
            <ui:insert name="content"/>
            <p:divider/>
            <footer style="clear: both">
                <h:graphicImage value="/public/img/jakarta_ee_400x400.png" alt="Jakarta EE logo"/>
                <p>
                    <h:outputText value="#{multiLanguage['footer.text.author']}"/>
                </p>
                <ui:insert name="js"/>
            </footer>
        </p:card>
    </h:body>
</f:view>
</html>
