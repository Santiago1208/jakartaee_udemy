<ui:component
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="primefaces">

            <h:form id="productForm">
                <div class="field grid">
                    <p:outputLabel value="#{multiLanguage['product.name']}:" for="name" class="p-col-fixed"
                                   style="width: 200px;"/>
                    <div class="col">
                        <p:inputText id="name" value="#{productController.product.name}" label="Name"/>
                    </div>
                    <div class="col">
                        <p:message for="name" style="color: red;"/>
                    </div>
                </div>
                <div class="field grid">
                    <p:outputLabel value="#{multiLanguage['product.price']}:" for="price" class="p-col-fixed"
                                   style="width: 200px;"/>
                    <div class="col">
                        <p:inputText id="price" value="#{productController.product.price}" label="Price"/>
                    </div>
                    <div class="col">
                        <p:message for="price" style="color: red;"/>
                    </div>
                </div>
                <div class="field grid">
                    <p:outputLabel value="#{multiLanguage['product.sku']}:" for="sku" class="p-col-fixed"
                                   style="width: 200px;"/>
                    <div class="col">
                        <p:inputText id="sku" value="#{productController.product.sku}" label="SKU"/>
                    </div>
                    <div class="col">
                        <p:message for="sku" style="color: red;"/>
                    </div>
                </div>
                <div class="field grid">
                    <p:outputLabel value="#{multiLanguage['product.createdAt']}:" for="createdAt"
                                   class="p-col-fixed" style="width: 200px;"/>
                    <div class="col">
                        <p:datePicker pattern="yyyy-MM-dd" id="createdAt" value="#{productController.product.createdAt}"
                                      converterMessage="Check your date format to be yyyy-MM-dd" label="Created At">
                            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                            <f:passThroughAttribute name="type" value="date"/>
                        </p:datePicker>
                    </div>
                    <div class="col">
                        <p:message for="createdAt" style="color: red;"/>
                    </div>
                </div>
                <div class="field grid">
                    <p:outputLabel value="#{multiLanguage['product.category']}:" for="category" class="p-col-fixed"
                                   style="width: 200px;"/>
                    <div class="col">
                        <p:selectOneMenu id="category" value="#{productController.product.category}">
                            <f:selectItem itemLabel="#{multiLanguage['product.category.selectOne']}"
                                          itemValue="#{null}"/>
                            <f:selectItems value="#{categories}" var="c" itemLabel="#{c.name}"/>
                            <f:converter binding="#{categoryConverter}"/>
                        </p:selectOneMenu>
                    </div>
                    <div class="col">
                        <p:message for="category" style="color: red;"/>
                    </div>
                </div>
                <div class="field grid">
                    <p:commandButton
                            value="#{productController.product.id > 0 ? multiLanguage['product.button.edit'] : multiLanguage['product.button.save']}"
                            action="#{productController.save}" class="ui-button-outlined" update="@form productsTable"/>
                    <h:inputHidden value="#{productController.product.id}"/>
                </div>
            </h:form>
</ui:component>
