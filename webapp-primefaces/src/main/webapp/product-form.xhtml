<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="primefaces"
        template="/layout/main.xhtml">
    <ui:define name="content">
        <f:metadata>
            <f:viewParam name="id" value="#{productController.id}"/>
        </f:metadata>
        <p:panelGrid columns="1">
            <f:facet name="header">
                <h:outputText value="#{product.id > 0 ? multiLanguage['menu.text.edit'] : multiLanguage['menu.text.new']}"/>
            </f:facet>
            <p:linkButton outcome="index" value="#{multiLanguage['product.button.back']}" class="p-my-2"/>
            <h:form>
                <p:panelGrid columns="3">
                    <p:outputLabel value="#{multiLanguage['product.name']}:" for="name" class="col-form-label"/>
                    <p:inputText id="name" value="#{product.name}" label="Name" class="form-control"/>
                    <p:message for="name" style="color: red;"/>

                    <p:outputLabel value="#{multiLanguage['product.price']}:" for="price" class="col-form-label"/>
                    <p:inputText id="price" value="#{product.price}" label="Price" class="form-control"/>
                    <p:message for="price" style="color: red;"/>

                    <p:outputLabel value="#{multiLanguage['product.sku']}:" for="sku" class="col-form-label"/>
                    <p:inputText id="sku" value="#{product.sku}" label="SKU" class="form-control"/>
                    <p:message for="sku" style="color: red;"/>

                    <p:outputLabel value="#{multiLanguage['product.createdAt']}:" for="createdAt" class="col-form-label"/>
                    <p:datePicker pattern="yyyy-MM-dd" id="createdAt" value="#{product.createdAt}"
                                 convertMessage="Check your date format to be yyyy-MM-dd" label="Created At"
                                 class="form-control">
                        <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                        <f:passThroughAttribute name="type" value="date"/>
                    </p:datePicker>
                    <p:message for="createdAt" style="color: red;"/>

                    <p:outputLabel value="#{multiLanguage['product.category']}:" for="category" class="col-form-label"/>
                    <p:selectOneMenu id="category" value="#{product.category}" class="form-select">
                        <f:selectItem itemLabel="#{multiLanguage['product.category.selectOne']}" itemValue="#{null}"/>
                        <f:selectItems value="#{categories}" var="c" itemLabel="#{c.name}"/>
                        <f:converter binding="#{categoryConverter}"/>
                    </p:selectOneMenu>
                    <p:message for="category" style="color: red;"/>

                    <p:commandButton value="#{product.id > 0 ? multiLanguage['product.button.edit'] : multiLanguage['product.button.save']}"
                                     action="#{productController.save}" ajax="false" class="ui-button-outlined"/>
                    <h:inputHidden value="#{product.id}"/>
                    <p>&#160;</p>
                </p:panelGrid>
            </h:form>
        </p:panelGrid>
    </ui:define>
</ui:composition>
