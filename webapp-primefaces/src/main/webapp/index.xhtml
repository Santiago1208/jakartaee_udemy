<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="primefaces"
        template="/layout/main.xhtml">
    <ui:define name="content">
        <p:card>
            <f:facet name="title">
                <h:outputText value="#{title}"/>
            </f:facet>
            <p:divider/>
            <h:form id="newProductForm">
                <p:commandButton value="#{multiLanguage['menu.text.new']}" onclick="PF('formDialog').show()"
                                 class="p-my-2" icon="pi pi-plus-circle">
                    <p:resetInput target="productForm"/>
                </p:commandButton>
            </h:form>
            <h:outputText value="#{multiLanguage['product.text.noResults']}" rendered="#{empty productController.products}" class="alert alert-warning"/>
            <h:form>
                <div class="field grid p-my-2">
                    <label for="nameSearch" class="col-fixed" style="width: 100px;">Search</label>
                    <div class="col">
                        <p:inputText id="nameSearch" value="#{productController.nameSearch}" placeholder="Some Name">
                            <p:ajax listener="#{productController.search}" event="keyup" update="productsTable result" />
                        </p:inputText>
                    </div>
                    <div class="col">
                        <h:outputText value="#{productController.nameSearch}" id="result" />
                    </div>
                </div>
            </h:form>
            <p:dataTable value="#{productController.products}" var="p" rendered="#{not empty productController.products}"
                         style="max-width: 65%;" id="productsTable" rows="5"
                         paginator="true" paginatorPosition="both"
                         paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                         currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                         rowsPerPageTemplate="5,10,{ShowAll|'All'}">
                <p:column headerText="#{multiLanguage['product.id']}">
                    <h:outputText value="#{p.id}"/>
                </p:column>
                <p:column headerText="#{multiLanguage['product.name']}">
                    <h:outputText value="#{p.name}"/>
                </p:column>
                <p:column headerText="#{multiLanguage['product.sku']}">
                    <h:outputText value="#{p.sku}"/>
                </p:column>
                <p:column headerText="#{multiLanguage['product.price']}">
                    <h:outputText value="#{p.price}"/>
                </p:column>
                <p:column headerText="#{multiLanguage['product.createdAt']}">
                    <h:outputText value="#{p.createdAt}">
                        <f:convertDateTime type="localDate" pattern="dd/MM/yyyy"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="#{multiLanguage['product.category']}">
                    <h:outputText value="#{p.category.name}"/>
                </p:column>
                <p:column headerText="#{multiLanguage['product.button.edit']}">
                    <h:form id="editForm">
                        <p:commandButton value="#{multiLanguage['product.button.edit']}"
                                         action="#{productController.edit(p.id)}"
                                         class="ui-button-success" onclick="PF('formDialog').show()" icon="pi pi-save" update="productForm">
                            <p:resetInput target="productForm"/>
                        </p:commandButton>
                    </h:form>
                </p:column>
                <p:column headerText="#{multiLanguage['product.button.delete']}">
                    <h:form id="deleteForm">
                        <p:commandButton value="#{multiLanguage['product.button.delete']}"
                                       action="#{productController.delete(p)}"
                                       onclick="return confirm(`#{multiLanguage['product.text.message.delete.confirmation']}`)"
                                       class="ui-button-danger" update="productsTable" icon="pi pi-trash"/>
                    </h:form>
                </p:column>
            </p:dataTable>
            <p:dialog header="#{productController.product.id > 0 ? multiLanguage['menu.text.edit'] : multiLanguage['menu.text.new']}"
                      widgetVar="formDialog" minHeight="200" minWidth="500" showEffect="fade" modal="true">
                <p:ajax event="close" listener="#{productController.onCloseDialog}" update="productForm" />
                <ui:include src="product-form.xhtml"/>
            </p:dialog>
        </p:card>
    </ui:define>
</ui:composition>
